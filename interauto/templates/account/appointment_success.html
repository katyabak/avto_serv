{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container px-3 py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <!-- Карточка успешной записи -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-4 p-lg-5 text-center">

                    <!-- Анимированная иконка успеха -->
                    <div class="mb-4">
                        <div class="success-icon mx-auto">
                            <i class="fas fa-check-circle fa-4x" style="color: #95444d;"></i>
                        </div>
                    </div>

                    <!-- Заголовок -->
                    <h2 class="fw-bold mb-3" style="color: #243642;">
                        Заявка успешно оформлена!
                    </h2>

                    <!-- Сообщение -->
                    <div class="alert alert-light border-0 bg-light rounded-3 p-4 mb-4">
                        <i class="fas fa-clock me-2" style="color: #95444d;"></i>
                        <span class="fw-semibold">В ближайшее время с Вами свяжется менеджер для подтверждения записи.</span>
                    </div>

                    <!-- Дополнительная информация -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center gap-3 p-3 bg-light rounded-3">
                                <i class="fas fa-phone fs-4" style="color: #95444d;"></i>
                                <div class="text-start">
                                    <small class="text-muted d-block">По всем вопросам</small>
                                    <span class="fw-semibold">+7 (913) 688-29-67</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="d-flex align-items-center gap-3 p-3 bg-light rounded-3">
                                <i class="fas fa-envelope fs-4" style="color: #95444d;"></i>
                                <div class="text-start">
                                    <small class="text-muted d-block">Электронная почта</small>
                                    <span class="fw-semibold">lisienko@interauto55.ru</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Кнопки действий -->
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a href="/account/" class="btn btn-primary py-2 px-4 rounded-3"
                           style="background: #95444d; border: none;">
                            <i class="fas fa-user me-2"></i>Вернуться в профиль
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="{% static 'css/appointment_success.css' %}">


{% endblock %}
